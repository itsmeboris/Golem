name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install black pylint pyflakes vulture
      - run: black --check golem/
      - run: pip install -e .
      - run: pylint --errors-only golem/
      - run: pylint --disable=all --enable=W0611,W0612,W0101 golem/
      - run: python3 scripts/pyflakes_noqa.py golem/
      - run: python3 -m vulture golem/ vulture_whitelist.py --min-confidence 80

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest golem/tests/ -x -q --tb=short --cov=golem --cov-report=term-missing:skip-covered --cov-fail-under=100
