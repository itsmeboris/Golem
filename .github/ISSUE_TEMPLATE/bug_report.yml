name: Bug Report
description: Report a bug in Golem
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `golem run -p "..."`
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Golem version, Python version, OS, Claude CLI version.
      placeholder: |
        - Golem: 0.1.0
        - Python: 3.11.x
        - OS: Ubuntu 24.04
        - Claude CLI: x.y.z
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or trace output
      description: Paste any error messages, stack traces, or JSONL trace snippets.
      render: shell
    validations:
      required: false
