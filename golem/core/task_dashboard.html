<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Golem Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="/dashboard/shared.css">
  <link rel="stylesheet" href="/dashboard/task.css">
</head>
<body>

<!-- Top Bar -->
<header class="top-bar">
  <div class="top-brand" aria-label="Golem Dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
    <span>Golem</span>
  </div>
  <nav class="top-nav" aria-label="Main navigation">
    <button class="nav-tab active" data-view="overview" aria-current="page">Overview</button>
    <button class="nav-tab" data-view="detail">Task Detail</button>
    <button class="nav-tab" data-view="merge-queue">Merge Queue</button>
    <button class="nav-tab" data-view="config">Config</button>
  </nav>
  <div class="top-stats" id="top-stats" aria-live="polite" aria-label="Daemon status"><span id="top-stats-inner"></span><span class="hb-container" id="hb-container"></span></div>
  <button class="theme-btn" title="Toggle theme" id="theme-toggle" aria-label="Toggle light/dark theme" onclick="toggleTheme()">&#9789;</button>
</header>

<main class="layout" role="main">
  <!-- Overview View -->
  <div class="overview-layout" id="view-overview" role="region" aria-label="Task overview">
    <div class="ov-left">
      <div class="ov-header">Tasks <span class="count" id="ov-task-count" aria-live="polite"></span></div>
      <div class="ov-controls">
        <input type="text" id="ov-search" placeholder="Search by ID, subject, or state\u2026" aria-label="Search tasks">
        <select id="ov-state-filter" aria-label="Filter by state">
          <option value="">All states</option>
          <option value="running">Running</option>
          <option value="completed">Completed</option>
          <option value="failed">Failed</option>
          <option value="detected">Detected</option>
        </select>
      </div>
      <div class="ov-list" id="ov-task-list" role="list" aria-label="Task list"></div>
      <div class="ov-pagination" id="ov-pagination"></div>
      <div class="ov-legend-bar" aria-label="Status legend">
        <span class="ov-legend-label">Status</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--blue)" aria-hidden="true"></span> Running / Verifying</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--green)" aria-hidden="true"></span> Completed</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--red)" aria-hidden="true"></span> Failed / Review</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--yellow)" aria-hidden="true"></span> Detected</span>
      </div>
    </div>
    <div class="ov-right">
      <div class="ov-preview" id="ov-preview"></div>
    </div>
  </div>

  <!-- Task Detail View -->
  <div class="task-detail" id="view-detail" style="display:none" role="region" aria-label="Task detail">
    <div class="td-back"><a id="td-back-link" aria-label="Back to dashboard overview">&larr; Dashboard</a></div>
    <div class="td-header" id="td-header"></div>
    <div class="metrics" id="td-metrics" aria-label="Task metrics"></div>
    <div class="td-live-strip" id="td-live-strip" style="display:none" aria-live="polite"></div>
    <div class="timeline-container">
      <div class="phase-sidebar"><nav class="phase-nav" id="phase-nav" aria-label="Task phases"></nav></div>
      <div class="timeline-main">
        <div class="tl-toolbar" id="tl-toolbar"></div>
        <div class="timeline-scroll" id="timeline-scroll"></div>
      </div>
    </div>
    <div class="info-tabs" id="info-tabs" style="display:none"></div>
  </div>

  <!-- Merge Queue View -->
  <div class="mq-view" id="view-merge-queue" style="display:none" role="region" aria-label="Merge queue">
    <div class="mq-metrics" id="mq-metrics"></div>
    <div class="mq-content" id="mq-content"></div>
  </div>

  <!-- Config View -->
  <div id="view-config" class="config-view" style="display:none" role="region" aria-label="Configuration">
    <div class="config-container">
      <div id="config-categories" class="config-categories"></div>
      <div id="config-fields" class="config-fields"></div>
    </div>
  </div>
</main>

<!-- Edit & Re-run Modal -->
<div class="modal-overlay" id="resubmit-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="resubmit-modal-title">
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 id="resubmit-modal-title">Edit &amp; Re-run Task</h3>
      <button class="modal-close" id="resubmit-modal-close" aria-label="Close dialog">&times;</button>
    </div>
    <div class="modal-body">
      <label class="modal-label" for="resubmit-subject">Subject</label>
      <input class="modal-input" id="resubmit-subject" type="text" placeholder="Task subject">
      <label class="modal-label" for="resubmit-prompt">Prompt</label>
      <textarea class="modal-textarea" id="resubmit-prompt" rows="12" placeholder="Task prompt..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" id="resubmit-cancel-btn">Cancel</button>
      <button class="modal-btn modal-btn-submit" id="resubmit-submit-btn">Submit</button>
    </div>
  </div>
</div>

<script src="/dashboard/shared.js"></script>
<script src="/dashboard/task_api.js"></script>
<script src="/dashboard/task_timeline.js"></script>
<script src="/dashboard/task_overview.js"></script>
<script src="/dashboard/heartbeat_widget.js"></script>
<script src="/dashboard/task_live.js"></script>
<link rel="stylesheet" href="/dashboard/merge_queue.css">
<script src="/dashboard/merge_queue.js"></script>
<link rel="stylesheet" href="/dashboard/config_tab.css">
<script src="/dashboard/config_tab.js"></script>
</body>
</html>
