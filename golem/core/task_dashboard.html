<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Golem Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/shared.css">
  <link rel="stylesheet" href="/dashboard/task.css">
</head>
<body>

<!-- Top Bar -->
<header class="top-bar">
  <div class="top-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
    <span>Golem</span>
  </div>
  <nav class="top-nav">
    <button class="nav-tab active" data-view="overview">Overview</button>
    <button class="nav-tab" data-view="detail">Task Detail</button>
  </nav>
  <div class="top-stats" id="top-stats"></div>
  <button class="theme-btn" title="Theme" id="theme-toggle" onclick="toggleTheme()">&#9789;</button>
</header>

<div class="layout">
  <!-- Overview View -->
  <div class="overview-layout" id="view-overview">
    <div class="ov-left">
      <div class="ov-header">Tasks <span class="count" id="ov-task-count"></span></div>
      <div class="ov-list" id="ov-task-list"></div>
    </div>
    <div class="ov-right">
      <div class="ov-preview" id="ov-preview"></div>
    </div>
  </div>

  <!-- Task Detail View -->
  <div class="task-detail" id="view-detail" style="display:none">
    <div class="td-back"><a id="td-back-link">&larr; Dashboard</a></div>
    <div class="td-header" id="td-header"></div>
    <div class="metrics" id="td-metrics"></div>
    <div class="td-live-strip" id="td-live-strip" style="display:none"></div>
    <div class="timeline-container">
      <div class="phase-sidebar"><nav class="phase-nav" id="phase-nav"></nav></div>
      <div class="timeline-main">
        <div class="tl-toolbar" id="tl-toolbar"></div>
        <div class="timeline-scroll" id="timeline-scroll"></div>
      </div>
    </div>
    <div class="info-tabs" id="info-tabs" style="display:none"></div>
  </div>
</div>

<script src="/dashboard/shared.js"></script>
<script src="/dashboard/task_api.js"></script>
<script src="/dashboard/task_timeline.js"></script>
<script src="/dashboard/task_overview.js"></script>
<script src="/dashboard/task_live.js"></script>
</body>
</html>
