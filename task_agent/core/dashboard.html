<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Golem — Dashboard</title>
<link rel="stylesheet" href="/dashboard/shared.css">
<style>
/* ══════════════════════════════════════════════════════════════
   Flow Dashboard — local styles only (shared CSS loaded above)
   ══════════════════════════════════════════════════════════════ */

/* ── Run List (sidebar scrollable area) ───────────────────── */
.run-list{flex:1;overflow-y:auto;padding:0.5rem}
.run-list::-webkit-scrollbar{width:4px}
.run-list::-webkit-scrollbar-thumb{background:var(--border-active);border-radius:2px}

/* ── Run Card ─────────────────────────────────────────────── */
.run-card{
  padding:0.75rem 0.85rem;margin-bottom:0.35rem;border-radius:var(--radius);
  cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;
  background:transparent
}
.run-card:hover{background:var(--bg-elevated)}
.run-card.selected{background:var(--bg-hover);border-left-color:var(--blue)}
.run-card .rc-top{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem}
.run-card .rc-event{font-size:0.78rem;font-weight:600;color:var(--text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.run-card .rc-badge{
  font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
  padding:0.1rem 0.4rem;border-radius:999px;white-space:nowrap;flex-shrink:0
}
.run-card .rc-summary{font-size:0.75rem;color:var(--text-muted);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.run-card .rc-meta{display:flex;gap:0.75rem;margin-top:0.35rem;font-size:0.7rem;color:var(--text-muted)}
.run-card .rc-meta span{display:flex;align-items:center;gap:0.2rem}

/* Flow colors for cards */
.run-card.flow-redmine{border-left-color:var(--red)}
.run-card.flow-jenkins{border-left-color:var(--blue)}
.run-card.flow-gerrit{border-left-color:var(--purple)}
.run-card.flow-task_agent{border-left-color:var(--cyan)}
.run-card.selected{border-left-color:var(--blue)}

/* Status badge colors */
.rc-badge.success{background:#064e3b;color:var(--green)}
.rc-badge.failure{background:#450a0a;color:var(--red)}
.rc-badge.skipped{background:#422006;color:var(--yellow)}
.rc-badge.running{background:#172554;color:var(--blue)}

/* Phase-specific badge colors for active runs */
.rc-badge.phase-queued{background:#422006;color:var(--yellow)}
.rc-badge.phase-preparing{background:var(--bg-elevated);color:var(--text-secondary)}
.rc-badge.phase-running{background:#172554;color:var(--blue)}
.rc-badge.phase-executing{background:#064e3b;color:var(--green)}
.rc-badge.phase-parsing{background:#1e1b4b;color:var(--purple)}

/* Active card pulse */
.run-card.active-run{border-left-color:var(--blue);background:rgba(23,37,84,.25)}

/* ── Overview State & Stat Cards ──────────────────────────── */
.overview-state{padding:1.5rem 2rem 3rem;max-width:1100px}
.overview-state h2{font-size:1.15rem;font-weight:600;margin-bottom:1rem;color:var(--text-primary)}

.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.6rem;margin-bottom:1.25rem}
.stat-card{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:0.7rem 0.85rem
}
.stat-card .sc-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:0.1rem}
.stat-card .sc-value{font-size:1.15rem;font-weight:700;color:var(--text-primary)}
.stat-card .sc-value.green{color:var(--green)}
.stat-card .sc-value.red{color:var(--red)}
.stat-card .sc-value.blue{color:var(--blue)}

/* ── Flow Grid ────────────────────────────────────────────── */
.flow-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.6rem;margin-bottom:1.25rem}
.flow-card{background:var(--bg-surface);border-radius:var(--radius);padding:0.85rem;border:1px solid var(--border)}
.flow-card h3{font-size:0.85rem;margin-bottom:0.35rem;color:var(--text-secondary);text-transform:capitalize}
.flow-card .fc-stats{font-size:0.78rem;color:var(--text-muted)}
.bar-bg{height:5px;background:var(--border-active);border-radius:3px;overflow:hidden;margin-top:0.5rem}
.bar-fg{height:100%;border-radius:3px;transition:width 0.4s}
.bar-fg.ok{background:var(--green)}
.bar-fg.warn{background:var(--yellow)}
.bar-fg.bad{background:var(--red)}

/* ── Live Overview Panel ──────────────────────────────────── */
.live-overview{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.25rem}
.live-overview.has-activity{border-color:var(--border-focus)}
.live-overview h3{font-size:0.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem}
.live-task{display:flex;align-items:center;gap:0.75rem;padding:0.4rem 0.6rem;background:var(--bg-base);border-radius:var(--radius);margin-bottom:0.3rem;font-size:0.8rem}
.live-task .lt-flow{font-weight:600;min-width:60px;text-transform:capitalize}
.live-task .lt-flow.redmine{color:var(--red)}
.live-task .lt-flow.jenkins{color:var(--blue)}
.live-task .lt-flow.gerrit{color:var(--purple)}
.live-task .lt-event{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary)}
.live-task .lt-phase{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;padding:0.1rem 0.4rem;border-radius:999px;font-weight:600}
.lt-phase.running{background:#172554;color:var(--blue)}
.lt-phase.queued{background:#422006;color:var(--yellow)}
.lt-phase.preparing{background:var(--bg-elevated);color:var(--text-secondary)}
.lt-phase.parsing{background:#1e1b4b;color:var(--purple)}
.lt-phase.executing{background:#064e3b;color:var(--green)}
.live-task .lt-elapsed{color:var(--text-muted);font-variant-numeric:tabular-nums;min-width:45px;text-align:right}
.model-chips{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem}
.model-chip{background:var(--bg-base);border-radius:0.375rem;padding:0.2rem 0.5rem;font-size:0.72rem;color:var(--text-secondary)}
.model-chip .count{color:var(--blue);font-weight:700;margin-left:0.25rem}
.live-empty{color:var(--text-muted);font-size:0.82rem;font-style:italic;padding:0.25rem 0}

/* ── Run Detail ───────────────────────────────────────────── */
.run-detail{padding:1.5rem 2rem 3rem;max-width:1100px}

/* Run Header */
.run-header{margin-bottom:1.25rem}
.run-header .rh-top{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.35rem}
.run-header .rh-event{font-size:1.1rem;font-weight:800;color:var(--text-primary);word-break:break-all}
.run-header .rh-badge{
  font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
  padding:0.2rem 0.6rem;border-radius:999px
}
.run-header .rh-flow{
  font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:var(--radius);
  font-weight:600;text-transform:capitalize
}
.rh-flow.redmine{background:rgba(248,113,113,.15);color:var(--red)}
.rh-flow.jenkins{background:rgba(96,165,250,.15);color:var(--blue)}
.rh-flow.gerrit{background:rgba(167,139,250,.15);color:var(--purple)}
.rh-flow.task_agent{background:rgba(34,211,238,.15);color:var(--cyan)}

/* ── Actions Section ──────────────────────────────────────── */
.actions-section{margin-bottom:1.5rem}
.actions-section h3{font-size:0.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em}
.action-chips{display:flex;flex-wrap:wrap;gap:0.3rem}
.act-chip{display:inline-flex;align-items:center;gap:0.25rem;padding:0.2rem 0.5rem;border-radius:0.3rem;font-size:0.72rem;font-weight:500;line-height:1.3}
.act-chip.classify{background:#1e1b4b;color:#c4b5fd}
.act-chip.ticket{background:var(--bg-elevated);color:var(--text-primary);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-chip.review{background:#172554;color:#93c5fd}
.act-chip.comment{background:#064e3b;color:var(--green-dim)}
.act-chip.generic{background:var(--bg-elevated);color:var(--text-secondary)}
.act-chip.severity-high{background:#450a0a;color:#fca5a5}
.act-chip.severity-medium{background:#422006;color:#fde68a}

/* ── Trace Accordion ──────────────────────────────────────── */
.trace-section{margin-bottom:1.5rem}
.trace-top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem}
.trace-top-bar h3{font-size:0.85rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em}
.trace-controls{display:flex;gap:0.5rem;align-items:center}
.trace-controls button{
  background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border);
  padding:0.3rem 0.6rem;border-radius:var(--radius);font-size:0.72rem;cursor:pointer;
  transition:all 0.12s
}
.trace-controls button:hover{background:var(--bg-hover);color:var(--text-primary)}
.trace-controls button.active{background:var(--border-focus);color:#fff;border-color:var(--border-focus)}

.trace-steps{display:flex;flex-direction:column;gap:0.35rem}

/* Tool step (collapsible) */
.trace-step{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.step-header{
  display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.75rem;
  cursor:pointer;transition:background 0.12s
}
.step-header:hover{background:var(--bg-elevated)}
.step-icon{min-width:1.1rem;text-align:center;flex-shrink:0;font-size:0.82rem}
.step-name{font-family:var(--font-mono);font-size:0.82rem;color:var(--cyan);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-meta{font-size:0.68rem;color:var(--text-muted);white-space:nowrap}
.step-chevron{color:var(--text-muted);font-size:0.65rem;transition:transform 0.2s;width:1rem;text-align:center}
.trace-step.expanded .step-chevron{transform:rotate(90deg)}
.trace-step.error{border-color:rgba(248,113,113,.3)}
.trace-step.error .step-name{color:var(--red)}

.step-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease-out}
.trace-step.expanded .step-body{max-height:none}
.step-result{
  padding:0.75rem 1rem;background:var(--bg-terminal);font-family:var(--font-mono);
  font-size:0.75rem;line-height:1.5;color:var(--text-secondary);
  white-space:pre-wrap;word-break:break-word;border-top:1px solid var(--border);
  max-height:600px;overflow-y:auto
}
.step-result::-webkit-scrollbar{width:4px}
.step-result::-webkit-scrollbar-thumb{background:var(--border-active);border-radius:2px}
.step-result.json .json-key{color:var(--blue)}
.step-result.json .json-str{color:var(--green-dim)}
.step-result.json .json-num{color:var(--orange)}
.step-result.json .json-bool{color:var(--purple)}
.step-result.json .json-null{color:var(--text-muted)}
.step-result.error-result{color:var(--red)}

/* Thinking block (collapsible) */
.trace-thinking{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.thinking-header{
  display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.75rem;
  cursor:pointer;font-size:0.78rem;color:var(--text-muted);font-style:italic;
  transition:background 0.12s
}
.thinking-header:hover{background:var(--bg-elevated)}
.thinking-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease-out}
.trace-thinking.expanded .thinking-body{max-height:2000px;overflow:visible}
.trace-thinking.expanded .step-chevron{transform:rotate(90deg)}
.thinking-body pre{
  padding:0.75rem 1rem;background:var(--bg-terminal);font-family:var(--font-mono);
  font-size:0.75rem;line-height:1.5;color:var(--text-muted);font-style:italic;
  white-space:pre-wrap;word-break:break-word;border-top:1px solid var(--border);
  max-height:500px;overflow-y:auto;margin:0
}

/* Text block (markdown-rendered) */
.trace-text-block{padding:0.5rem 0.75rem;border-left:2px solid var(--border-active);margin:0.2rem 0}

/* System init */
.trace-init{font-size:0.72rem;color:var(--blue);opacity:0.6;padding:0.3rem 0.75rem;font-family:var(--font-mono)}

/* Result footer */
.trace-result{padding:0.5rem 0.75rem;font-weight:600;color:var(--green);border-top:1px solid var(--border);margin-top:0.35rem;font-family:var(--font-mono);font-size:0.82rem}
.trace-result.error{color:var(--red)}

.trace-loading{color:var(--text-muted);font-size:0.8rem;padding:1.5rem;text-align:center;font-style:italic}

/* ── Live elapsed timer in run detail ─────────────────────── */
.rh-elapsed{font-size:0.78rem;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>

<div class="layout">
  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo">&#9879;</span> Golem</h1>
      <div class="sidebar-stats" id="sidebar-stats">Loading...</div>
    </div>
    <div class="sidebar-filters">
      <div class="filter-row">
        <input type="search" id="search-input" placeholder="Search runs...">
      </div>
      <div class="filter-row">
        <select id="flow-filter">
          <option value="">All flows</option>
        </select>
        <select id="status-filter">
          <option value="">All</option>
          <option value="success">Success</option>
          <option value="failure">Failure</option>
          <option value="skipped">Skipped</option>
        </select>
        <select id="period">
          <option value="6">6h</option>
          <option value="24" selected>24h</option>
          <option value="72">3d</option>
          <option value="168">7d</option>
          <option value="720">30d</option>
        </select>
      </div>
    </div>
    <div class="run-list" id="run-list">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <main class="main" id="main">
    <!-- Overview state (shown when no run selected) -->
    <div class="overview-state" id="overview-state">
      <div class="config-bar" id="config-bar" style="display:none"></div>
      <div class="live-overview" id="live-overview">
        <h3><span class="live-dot idle" id="live-dot"></span> Live</h3>
        <div id="live-tasks"></div>
        <div id="live-models"></div>
      </div>
      <div class="stat-cards" id="stat-cards"></div>
      <div class="flow-grid" id="flow-grid"></div>
    </div>

    <!-- Run detail (hidden until selected) -->
    <div class="run-detail hidden" id="run-detail">
      <header class="run-header" id="run-header"></header>
      <div class="metrics-row" id="metrics-row"></div>
      <div class="actions-section hidden" id="actions-section">
        <h3>Actions</h3>
        <div class="action-chips" id="action-chips"></div>
      </div>
      <div class="info-tabs" id="info-tabs">
        <div class="tab-bar" id="tab-bar">
          <button class="tab-btn active" data-tab="report" onclick="activateTab('report')">Report</button>
          <button class="tab-btn" data-tab="prompt" onclick="activateTab('prompt')">Prompt</button>
          <button class="tab-btn" data-tab="raw" onclick="activateTab('raw')">Raw JSON</button>
        </div>
        <div id="tab-report" class="tab-content active"></div>
        <div id="tab-prompt" class="tab-content"></div>
        <div id="tab-raw" class="tab-content"></div>
      </div>
      <div class="trace-section hidden" id="trace-section">
        <div class="trace-top-bar">
          <h3>Trace</h3>
          <div class="trace-controls">
            <button id="btn-text" class="active" onclick="toggleText()">Hide text</button>
            <button id="btn-thinking" onclick="toggleThinking()">Show thinking</button>
            <button onclick="expandAllSteps()">Expand all</button>
            <button onclick="collapseAllSteps()">Collapse all</button>
          </div>
        </div>
        <div class="trace-steps" id="trace-steps"></div>
      </div>
    </div>
  </main>
</div>

<script src="/dashboard/shared.js"></script>
<script>
/* ── State ─────────────────────────────────────────────────── */
let _allRuns = [];
let _selectedEid = null;   /* event_id (kept for active-task + trace/tab lookups) */
let _selectedIdx = -1;     /* index into _allRuns (disambiguates duplicate event_ids) */
let _selectedStarted = ''; /* started_at of the selected run (for re-resolution after refresh) */
let _showText = true;
let _showThinking = false;
let _prevFingerprint = '';
let _liveSnap = {};
let _traceEvents = null; /* cached parsed trace for current run */
let _tabCache = {};
let _liveTraceInterval = null; /* polling interval for active-run trace */
let _liveElapsedInterval = null; /* interval for updating elapsed timer in run detail */

/* ── Flow-specific Utilities ──────────────────────────────── */
function barClass(rate) { return rate >= 90 ? 'ok' : rate >= 70 ? 'warn' : 'bad'; }

function runStatus(r) {
  return r.success ? (r.actions_taken && r.actions_taken.length ? 'success' : 'skipped') : 'failure';
}

function badgeStyle(status) {
  const m = {
    success: 'background:#064e3b;color:#4ade80',
    failure: 'background:#450a0a;color:#f87171',
    skipped: 'background:#422006;color:#fbbf24',
    running: 'background:#172554;color:#60a5fa',
  };
  return m[status] || 'background:#1e293b;color:#94a3b8';
}

/* Map phase to badge CSS class */
function phaseBadgeClass(phase) {
  const map = {
    queued: 'phase-queued',
    preparing: 'phase-preparing',
    running: 'phase-running',
    executing: 'phase-executing',
    parsing: 'phase-parsing',
  };
  return map[phase] || 'running';
}

/* Build short summary text from actions_taken */
function shortSummary(r) {
  const acts = r.actions_taken || [];
  if (!r.success && !acts.length) {
    return r.error ? truncText(r.error, 80) : 'Failed';
  }
  if (!acts.length) return '';
  let cls = '', sev = '', tkt = '', rvw = '', cmt = '';
  for (const a of acts) {
    let m;
    if ((m = a.match(/^classified:(.+?)\/(.+)/))) { cls = m[1].replace(/_/g, ' '); sev = m[2]; }
    else if ((m = a.match(/^ticket_recommended:\s*(.+)/))) { tkt = m[1]; }
    else if ((m = a.match(/^review_posted:change=\d+,label=([^,]+)/))) { rvw = m[1]; }
    else if ((m = a.match(/^comment_posted:issue=(\d+)(?:,verdict=(.+))?/))) { cmt = m[2] ? m[2].replace(/_/g, ' ') : 'commented on #' + m[1]; }
  }
  let text = '';
  if (cls) text = cls + (sev ? ' / ' + sev : '');
  else if (rvw) text = 'Review: ' + rvw;
  else if (cmt) text = cmt;
  if (tkt) { if (text) text += ' \u2014 '; text += tkt; }
  if (!text) text = acts.length + ' action' + (acts.length !== 1 ? 's' : '');
  return text;
}

function renderStepResult(text, isError) {
  const { formatted, isJson, isPartialJson } = tryFormatJson(text);
  const escaped = esc(formatted);
  if (isJson && !isError) {
    return '<pre class="step-result json">' + highlightJson(escaped) + '</pre>';
  }
  if (isPartialJson && !isError) {
    return '<pre class="step-result json">' + highlightJson(escaped) + '<span style="color:var(--text-muted);font-style:italic">\n\u2026 (truncated)</span></pre>';
  }
  return '<pre class="step-result' + (isError ? ' error-result' : '') + '">' + escaped + '</pre>';
}

/* ── Clear live polling intervals ─────────────────────────── */
function clearLivePolling() {
  if (_liveTraceInterval) {
    clearInterval(_liveTraceInterval);
    _liveTraceInterval = null;
  }
  if (_liveElapsedInterval) {
    clearInterval(_liveElapsedInterval);
    _liveElapsedInterval = null;
  }
}

/* ── Sidebar rendering ─────────────────────────────────────── */
function renderSidebar() {
  const list = $('#run-list');
  const search = ($('#search-input').value || '').trim().toLowerCase();
  const flowFilter = $('#flow-filter').value;
  const statusFilter = $('#status-filter').value;

  /* Combine active tasks + historical runs; exclude task_agent (has own dashboard) */
  const activeTasks = (_liveSnap.active_tasks || []).filter(t => t.flow !== 'task_agent');
  const activeEids = new Set(activeTasks.map(t => t.event_id));

  /* Filter runs */
  let runs = _allRuns.filter(r => {
    if (r.flow === 'task_agent') return false; /* task_agent has its own dashboard */
    if (flowFilter && r.flow !== flowFilter) return false;
    if (statusFilter && runStatus(r) !== statusFilter) return false;
    if (search) {
      const hay = [r.event_id, r.flow, r.model, r.error, ...(r.actions_taken || [])].join('\0').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  /* Stats */
  const total = _allRuns.length;
  const activeCount = activeTasks.length;
  const failCount = _allRuns.filter(r => !r.success).length;
  const liveDot = activeCount > 0 ? 'active' : 'idle';
  $('#sidebar-stats').innerHTML =
    total + ' runs' +
    (failCount ? ' / <span style="color:var(--red)">' + failCount + ' failed</span>' : '') +
    '<span class="sidebar-live"><span class="live-dot ' + liveDot + '"></span>' + activeCount + ' running</span>';

  if (!runs.length && !activeTasks.length) {
    list.innerHTML = '<div class="sidebar-empty">No runs found for the selected filters.</div>';
    return;
  }

  let html = '';

  /* Active tasks section */
  const activeRuns = activeTasks.filter(t => {
    if (flowFilter && t.flow !== flowFilter) return false;
    if (statusFilter && statusFilter !== 'success') return true; /* active can't be filtered by success/failure */
    if (statusFilter) return false;
    if (search && !((t.event_id + ' ' + t.flow).toLowerCase().includes(search))) return false;
    return true;
  });
  if (activeRuns.length) {
    html += '<div class="sidebar-section-label">Active</div>';
    html += activeRuns.map(t => {
      const sel = t.event_id === _selectedEid && _selectedIdx === -1 ? ' selected' : '';
      const short = truncText(t.event_id, 45);
      const phase = t.phase || 'running';
      const badgeCls = phaseBadgeClass(phase);
      const countdownText = phase === 'queued' && t.scheduled_at ? ' ' + fmtCountdown(t.scheduled_at) : '';
      return '<div class="run-card active-run flow-' + esc(t.flow) + sel + '" data-eid="' + esc(t.event_id) + '" data-idx="-1" onclick="selectRunByEid(\'' + esc(t.event_id) + '\')">' +
        '<div class="rc-top">' +
          '<span class="rc-event" title="' + esc(t.event_id) + '">' + esc(short) + '</span>' +
          '<span class="rc-badge ' + badgeCls + '">' + esc(phase) + '</span>' +
        '</div>' +
        '<div class="rc-meta">' +
          '<span style="font-weight:600;text-transform:capitalize;color:var(--text-secondary)">' + esc(t.flow) + '</span>' +
          '<span>' + fmtDuration(t.elapsed_s) + countdownText + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* Completed runs */
  if (runs.length) {
    if (activeRuns.length) html += '<div class="sidebar-section-label">History</div>';
    html += runs.map(r => {
      const eid = r.event_id || '';
      const idx = _allRuns.indexOf(r);
      const sel = idx === _selectedIdx ? ' selected' : '';
      const status = runStatus(r);
      const short = truncText(eid, 45);
      const summary = shortSummary(r);

      return '<div class="run-card flow-' + esc(r.flow) + sel + '" data-eid="' + esc(eid) + '" data-idx="' + idx + '" onclick="selectRun(' + idx + ')">' +
        '<div class="rc-top">' +
          '<span class="rc-event" title="' + esc(eid) + '">' + esc(short) + '</span>' +
          '<span class="rc-badge ' + status + '" style="' + badgeStyle(status) + '">' + status + '</span>' +
        '</div>' +
        (summary ? '<div class="rc-summary">' + esc(summary) + '</div>' : '') +
        '<div class="rc-meta">' +
          '<span style="font-weight:600;text-transform:capitalize">' + esc(r.flow) + '</span>' +
          '<span>' + fmtAgo(r.started_at) + '</span>' +
          '<span>' + fmtCost(r.cost_usd) + '</span>' +
          '<span>' + fmtDuration(r.duration_s) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  list.innerHTML = html;
}

/* ── Run selection & routing ──────────────────────────────── */
function selectRun(idx) {
  clearLivePolling();
  const run = _allRuns[idx];
  if (!run) return;
  _selectedEid = run.event_id;
  _selectedIdx = idx;
  _selectedStarted = run.started_at || '';
  _traceEvents = null;
  location.hash = '/run/' + encodeURIComponent(run.event_id + '::' + (run.started_at || idx));

  $$('.run-card').forEach(el => el.classList.toggle('selected', String(el.dataset.idx) === String(idx)));
  $('#overview-state').classList.add('hidden');
  $('#run-detail').classList.remove('hidden');
  renderRunDetail(run);
}

function selectRunByEid(eid) {
  clearLivePolling();
  /* Used for active tasks and URL-hash navigation (backward-compat) */
  _selectedEid = eid;
  _selectedIdx = -1;
  _selectedStarted = '';
  _traceEvents = null;
  location.hash = '/run/' + encodeURIComponent(eid);

  $$('.run-card').forEach(el => el.classList.toggle('selected', el.dataset.eid === eid && el.dataset.idx === '-1'));
  $('#overview-state').classList.add('hidden');
  $('#run-detail').classList.remove('hidden');

  const run = _allRuns.find(r => r.event_id === eid);
  if (run) renderRunDetail(run);
  else {
    /* Active task with no history yet */
    const active = (_liveSnap.active_tasks || []).find(t => t.event_id === eid);
    if (active) renderActiveRunDetail(active);
  }
}

function deselectRun() {
  clearLivePolling();
  _selectedEid = null;
  _selectedIdx = -1;
  _selectedStarted = '';
  _traceEvents = null;
  $('#overview-state').classList.remove('hidden');
  $('#run-detail').classList.add('hidden');
  $$('.run-card.selected').forEach(el => el.classList.remove('selected'));
  if (location.hash) history.pushState(null, '', location.pathname);
}

function handleHash() {
  const hash = location.hash;
  const m = hash.match(/^#\/run\/(.+)/);
  if (!m) { deselectRun(); return; }
  const raw = decodeURIComponent(m[1]);
  /* New format: event_id::started_at — find exact run */
  const sep = raw.indexOf('::');
  if (sep > 0) {
    const eid = raw.slice(0, sep);
    const started = raw.slice(sep + 2);
    const idx = _allRuns.findIndex(r => r.event_id === eid && r.started_at === started);
    if (idx >= 0) { selectRun(idx); return; }
  }
  /* Fallback: plain event_id (active tasks / old links) */
  selectRunByEid(raw);
}

/* ── Run Detail rendering ─────────────────────────────────── */
function renderRunDetail(r) {
  renderRunHeader(r);
  renderRunMetrics(r);
  renderActions(r);
  loadTrace(r.event_id);
  loadTabContent('report', r.event_id);
  activateTab('report');
  renderRawTab(r);
}

function renderActiveRunDetail(t) {
  const phase = t.phase || 'running';
  const badgeCls = phaseBadgeClass(phase);

  /* Compute elapsed from started_at if available, fallback to t.elapsed_s */
  const startedIso = t.started_at || '';
  const elapsedNow = startedIso ? (Date.now() - new Date(startedIso).getTime()) / 1000 : (t.elapsed_s || 0);

  $('#run-header').innerHTML =
    '<button class="back-btn" onclick="deselectRun()">\u2190 Dashboard</button>' +
    '<div class="rh-top">' +
      '<span class="rh-flow ' + esc(t.flow) + '">' + esc(t.flow) + '</span>' +
      '<span class="rh-event">' + esc(t.event_id) + '</span>' +
      '<span class="rh-badge ' + badgeCls + '">' + esc(phase) + '</span>' +
      '<span class="rh-elapsed" id="rh-live-elapsed">' + fmtDuration(elapsedNow) + '</span>' +
    '</div>';

  $('#metrics-row').innerHTML =
    '<div class="metric-card"><div class="mc-label">Phase</div><div class="mc-value blue">' + esc(phase) + '</div></div>' +
    '<div class="metric-card"><div class="mc-label">Elapsed</div><div class="mc-value" id="metric-live-elapsed">' + fmtDuration(elapsedNow) + '</div></div>' +
    '<div class="metric-card"><div class="mc-label">Model</div><div class="mc-value" style="font-size:0.85rem">' + esc(t.model) + '</div></div>';
  $('#actions-section').classList.add('hidden');
  $('#trace-section').classList.add('hidden');
  $('#tab-report').innerHTML = '<div class="no-data">Run is still in progress...</div>';
  $('#tab-prompt').innerHTML = '';
  renderRawTab({ event_id: t.event_id, flow: t.flow, model: t.model, phase: phase });

  /* Start live elapsed timer */
  _liveElapsedInterval = setInterval(function() {
    const now = startedIso ? (Date.now() - new Date(startedIso).getTime()) / 1000 : (t.elapsed_s || 0);
    const elHeader = $('#rh-live-elapsed');
    const elMetric = $('#metric-live-elapsed');
    if (elHeader) elHeader.textContent = fmtDuration(now);
    if (elMetric) elMetric.textContent = fmtDuration(now);
  }, 1000);

  /* Start polling trace for active run */
  startLiveTracePolling(t.event_id);
}

/* ── Live trace polling for active runs ───────────────────── */
function startLiveTracePolling(eventId) {
  /* Immediately attempt to load trace */
  fetchLiveTrace(eventId);

  /* Then poll every 3 seconds */
  _liveTraceInterval = setInterval(function() {
    /* Stop polling if this run is no longer selected */
    if (_selectedEid !== eventId) {
      clearLivePolling();
      return;
    }
    fetchLiveTrace(eventId);
  }, 3000);
}

async function fetchLiveTrace(eventId) {
  try {
    const res = await fetch('/api/trace-terminal/' + encodeURIComponent(eventId));
    if (!res.ok) return;
    const data = await res.json();
    const events = data.events || [];
    if (events.length > 0) {
      _traceEvents = events;
      const section = $('#trace-section');
      section.classList.remove('hidden');
      renderTrace(events);
    }
  } catch (e) {
    /* Ignore fetch errors during live polling */
  }
}

function renderRunHeader(r) {
  const status = runStatus(r);
  const flow = r.flow || '';
  const model = r.model || '';
  const shortModel = model.replace(/^claude-/, '').replace(/-2025\d+$/, '');

  $('#run-header').innerHTML =
    '<button class="back-btn" onclick="deselectRun()">\u2190 Dashboard</button>' +
    '<div class="rh-top">' +
      '<span class="rh-flow ' + esc(flow) + '">' + esc(flow) + '</span>' +
      '<span class="rh-event">' + esc(r.event_id) + '</span>' +
      '<span class="rh-badge" style="' + badgeStyle(status) + '">' + status + '</span>' +
      (shortModel ? '<span style="font-size:0.7rem;color:var(--text-muted)" title="' + esc(model) + '">' + esc(shortModel) + '</span>' : '') +
    '</div>' +
    (r.error && !r.success ? '<div style="font-size:0.82rem;color:var(--red);margin-top:0.35rem;line-height:1.4">' + esc(truncText(r.error, 200)) + '</div>' : '');
}

function renderRunMetrics(r) {
  const tokens = (r.input_tokens || 0) + (r.output_tokens || 0);
  const actions = (r.actions_taken || []).length;
  const cards = [
    { label: 'Duration', value: fmtDuration(r.duration_s), cls: '' },
    { label: 'Cost', value: fmtCost(r.cost_usd), cls: '' },
    { label: 'Tokens', value: tokens.toLocaleString(), cls: '' },
    { label: 'Actions', value: actions, cls: actions > 0 ? 'green' : '' },
  ];
  if (r.input_tokens) cards.push({ label: 'In / Out', value: (r.input_tokens || 0).toLocaleString() + ' / ' + (r.output_tokens || 0).toLocaleString(), cls: '' });

  $('#metrics-row').innerHTML = cards.map(function(c) {
    return '<div class="metric-card">' +
      '<div class="mc-label">' + c.label + '</div>' +
      '<div class="mc-value ' + c.cls + '">' + c.value + '</div>' +
    '</div>';
  }).join('');
}

function renderActions(r) {
  const acts = r.actions_taken || [];
  const section = $('#actions-section');
  if (!acts.length) { section.classList.add('hidden'); return; }
  section.classList.remove('hidden');

  $('#action-chips').innerHTML = acts.map(function(a) {
    let m;
    if ((m = a.match(/^classified:(.+?)\/(.+)/))) {
      const sev = m[2];
      const sevCls = sev === 'high' ? 'severity-high' : sev === 'medium' ? 'severity-medium' : '';
      return '<span class="act-chip classify">' + esc(m[1].replace(/_/g, ' ')) + '</span><span class="act-chip ' + sevCls + '">' + esc(sev) + '</span>';
    }
    if ((m = a.match(/^ticket_recommended:\s*(.+)/))) return '<span class="act-chip ticket" title="' + esc(m[1]) + '">' + esc(truncText(m[1], 60)) + '</span>';
    if ((m = a.match(/^review_posted:change=(\d+),label=([^,]+)/))) return '<span class="act-chip review">Review #' + esc(m[1]) + ': ' + esc(m[2]) + '</span>';
    if ((m = a.match(/^comment_posted:issue=(\d+)(?:,verdict=(.+))?/))) return '<span class="act-chip comment">' + (m[2] ? esc(m[2].replace(/_/g, ' ')) : 'comment') + ' on #' + esc(m[1]) + '</span>';
    return '<span class="act-chip generic">' + esc(truncText(a, 60)) + '</span>';
  }).join('');
}

/* ── Trace (accordion renderer) ─────────────────────────────── */
async function loadTrace(eventId) {
  const section = $('#trace-section');
  const container = $('#trace-steps');
  section.classList.remove('hidden');
  container.innerHTML = '<div class="trace-loading">Loading trace\u2026</div>';

  try {
    const res = await fetch('/api/trace-terminal/' + encodeURIComponent(eventId));
    if (!res.ok) { section.classList.add('hidden'); return; }
    const data = await res.json();
    _traceEvents = data.events || [];
    renderTrace(_traceEvents);
  } catch (e) {
    section.classList.add('hidden');
  }
}

/* Group flat events into structured steps: pair tool_call with its tool_result */
function groupTraceSteps(events) {
  const steps = [];
  const pending = []; /* queue of unmatched tool_call steps */

  for (const ev of events) {
    const kind = ev.type || ev.kind || '';

    if (kind === 'tool_call') {
      pending.push({ type: 'tool_step', name: ev.tool_name || ev.text, result: null, is_error: false });
    } else if (kind === 'tool_result') {
      if (pending.length) {
        const step = pending.shift();
        step.result = ev.text || '';
        step.is_error = ev.is_error || false;
        steps.push(step);
      }
    } else {
      /* Flush pending tool_calls that never got results */
      while (pending.length) steps.push(pending.shift());
      steps.push({ type: kind, text: ev.text || '', is_error: ev.is_error });
    }
  }
  while (pending.length) steps.push(pending.shift());
  return steps;
}

function renderTrace(events) {
  const container = $('#trace-steps');
  const steps = groupTraceSteps(events);

  const html = steps.map(function(s, i) {
    switch (s.type) {
      case 'system_init':
        return '<div class="trace-init">\u25B6 ' + esc(s.text) + '</div>';

      case 'thinking':
        if (!_showThinking) return '';
        var thinkPreview = truncText(s.text.replace(/\n/g, ' '), 80);
        return '<div class="trace-thinking" data-idx="' + i + '">' +
          '<div class="thinking-header" onclick="toggleTraceNode(this)">' +
            '<span>~ ' + esc(thinkPreview) + '</span>' +
            '<span style="margin-left:auto;font-size:0.65rem">' + (s.text.length / 1024).toFixed(1) + 'KB</span>' +
            '<span class="step-chevron">\u25B8</span>' +
          '</div>' +
          '<div class="thinking-body"><pre>' + esc(s.text) + '</pre></div>' +
        '</div>';

      case 'text':
        if (!_showText) return '';
        return '<div class="trace-text-block">' + renderMarkdown(s.text) + '</div>';

      case 'tool_step':
        var hasResult = s.result != null && s.result.length > 0;
        var errCls = s.is_error ? ' error' : '';
        var sizeStr = hasResult
          ? (s.result.length > 1000 ? (s.result.length / 1024).toFixed(1) + 'KB' : s.result.length + ' chars')
          : '';
        var metaStr = s.is_error ? '\u2717 error' : sizeStr;

        return '<div class="trace-step' + errCls + '" data-idx="' + i + '">' +
          '<div class="step-header" onclick="toggleTraceNode(this)">' +
            '<span class="step-icon">\u2699</span>' +
            '<span class="step-name">' + esc(s.name) + '</span>' +
            (metaStr ? '<span class="step-meta">' + esc(metaStr) + '</span>' : '') +
            '<span class="step-chevron">\u25B8</span>' +
          '</div>' +
          '<div class="step-body">' +
            (hasResult ? renderStepResult(s.result, s.is_error) : '<pre class="step-result" style="color:var(--text-muted);font-style:italic">No output</pre>') +
          '</div>' +
        '</div>';

      case 'error':
        return '<div class="trace-step error expanded" data-idx="' + i + '">' +
          '<div class="step-header" onclick="toggleTraceNode(this)">' +
            '<span class="step-icon">\u2717</span>' +
            '<span class="step-name">Error</span>' +
            '<span class="step-chevron">\u25B8</span>' +
          '</div>' +
          '<div class="step-body"><pre class="step-result error-result">' + esc(s.text) + '</pre></div>' +
        '</div>';

      case 'result':
        return '<div class="trace-result' + (s.is_error ? ' error' : '') + '">\u2501 ' + esc(s.text) + '</div>';

      default:
        return s.text ? '<div class="trace-text-block"><p style="color:var(--text-muted)">' + esc(s.text) + '</p></div>' : '';
    }
  }).join('');

  container.innerHTML = html || '<div class="trace-loading">No trace events.</div>';
}

function toggleTraceNode(headerEl) {
  headerEl.parentElement.classList.toggle('expanded');
}

function expandAllSteps() {
  $$('.trace-step, .trace-thinking').forEach(function(el) { el.classList.add('expanded'); });
}

function collapseAllSteps() {
  $$('.trace-step, .trace-thinking').forEach(function(el) { el.classList.remove('expanded'); });
}

function toggleText() {
  _showText = !_showText;
  var btn = $('#btn-text');
  btn.textContent = _showText ? 'Hide text' : 'Show text';
  btn.classList.toggle('active', _showText);
  if (_traceEvents) renderTrace(_traceEvents);
}

function toggleThinking() {
  _showThinking = !_showThinking;
  var btn = $('#btn-thinking');
  btn.textContent = _showThinking ? 'Hide thinking' : 'Show thinking';
  btn.classList.toggle('active', _showThinking);
  if (_traceEvents) renderTrace(_traceEvents);
}

/* ── Tabs ──────────────────────────────────────────────────── */
function activateTab(name) {
  $$('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === name); });
  $$('.tab-content').forEach(function(c) { c.classList.toggle('active', c.id === 'tab-' + name); });
  /* Lazy load */
  if (_selectedEid && !_tabCache[name + '::' + _selectedEid]) {
    loadTabContent(name, _selectedEid);
  }
}

async function loadTabContent(tab, eventId) {
  var key = tab + '::' + eventId;
  if (_tabCache[key]) { renderTabContent(tab, _tabCache[key]); return; }

  var el = $('#tab-' + tab);
  el.innerHTML = '<div class="no-data">Loading\u2026</div>';

  if (tab === 'raw') return; /* raw is rendered synchronously */

  var endpoints = { report: '/api/report/', prompt: '/api/prompt/' };
  if (!endpoints[tab]) return;

  try {
    var res = await fetch(endpoints[tab] + encodeURIComponent(eventId));
    if (!res.ok) { renderTabContent(tab, null); return; }
    var data = await res.json();
    _tabCache[key] = data;
    renderTabContent(tab, data);
  } catch (e) { renderTabContent(tab, null); }
}

function renderTabContent(tab, data) {
  var el = $('#tab-' + tab);
  if (!data) { el.innerHTML = '<div class="no-data">No ' + tab + ' data available for this run</div>'; return; }

  if (tab === 'report') {
    el.innerHTML = renderMarkdown(data.markdown);
  } else if (tab === 'prompt') {
    var size = data.size_bytes ? (data.size_bytes / 1024).toFixed(1) + 'KB' : '';
    el.innerHTML = (size ? '<div style="margin-bottom:.5rem;font-size:.75rem;color:var(--text-muted)">Prompt size: ' + size + '</div>' : '') +
      '<pre>' + esc(data.prompt) + '</pre>';
  }
}

function renderRawTab(r) {
  $('#tab-raw').innerHTML = '<pre>' + esc(JSON.stringify(r, null, 2)) + '</pre>';
}

/* ── Overview rendering ────────────────────────────────────── */
function renderOverview(stats) {
  var rateClass = stats.success_rate >= 90 ? 'green' : stats.success_rate >= 70 ? '' : 'red';
  $('#stat-cards').innerHTML =
    '<div class="stat-card"><div class="sc-label">Total Runs</div><div class="sc-value">' + stats.total_runs + '</div></div>' +
    '<div class="stat-card"><div class="sc-label">Success Rate</div><div class="sc-value ' + rateClass + '">' + stats.success_rate + '%</div></div>' +
    '<div class="stat-card"><div class="sc-label">Failures</div><div class="sc-value ' + (stats.failure_count ? 'red' : '') + '">' + stats.failure_count + '</div></div>' +
    '<div class="stat-card"><div class="sc-label">Avg Duration</div><div class="sc-value">' + fmtDuration(stats.avg_duration_s) + '</div></div>' +
    '<div class="stat-card"><div class="sc-label">Total Cost</div><div class="sc-value">$' + stats.total_cost_usd.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="sc-label">Tokens Used</div><div class="sc-value">' + stats.total_tokens.toLocaleString() + '</div></div>';

  /* Flow grid */
  var entries = Object.entries(stats.by_flow || {});
  if (!entries.length) { $('#flow-grid').innerHTML = ''; return; }
  $('#flow-grid').innerHTML = entries.map(function(pair) {
    var name = pair[0], d = pair[1];
    var cls = barClass(d.success_rate);
    return '<div class="flow-card">' +
      '<h3>' + esc(name) + '</h3>' +
      '<div class="fc-stats">' + d.success + '/' + d.total + ' passed (' + d.success_rate + '%)</div>' +
      '<div class="bar-bg"><div class="bar-fg ' + cls + '" style="width:' + d.success_rate + '%"></div></div>' +
    '</div>';
  }).join('');
}

function renderLiveOverview(live) {
  var dot = $('#live-dot');
  var panel = $('#live-overview');
  var busy = live.active_count > 0;
  dot.className = busy ? 'live-dot active' : 'live-dot idle';
  panel.className = busy ? 'live-overview has-activity' : 'live-overview';

  var tasksEl = $('#live-tasks');
  var flowTasks = (live.active_tasks || []).filter(function(t) { return t.flow !== 'task_agent'; });
  if (!flowTasks.length) {
    tasksEl.innerHTML = '<div class="live-empty">No tasks in progress</div>';
  } else {
    tasksEl.innerHTML = flowTasks.map(function(t) {
      var short = truncText(t.event_id, 50);
      var phase = t.phase || 'running';
      var countdownText = phase === 'queued' && t.scheduled_at ? ' ' + fmtCountdown(t.scheduled_at) : '';
      return '<div class="live-task" style="cursor:pointer" onclick="selectRunByEid(\'' + esc(t.event_id) + '\')">' +
        '<span class="lt-flow ' + esc(t.flow) + '">' + esc(t.flow) + '</span>' +
        '<span class="lt-event" title="' + esc(t.event_id) + '">' + esc(short) + '</span>' +
        '<span class="lt-phase ' + esc(phase) + '">' + esc(phase) + '</span>' +
        '<span class="lt-elapsed">' + fmtDuration(t.elapsed_s) + countdownText + '</span>' +
      '</div>';
    }).join('');
  }

  var modelsEl = $('#live-models');
  var models = Object.entries(live.models_active || {});
  if (!models.length) { modelsEl.innerHTML = ''; }
  else {
    modelsEl.innerHTML = '<div class="model-chips">' + models.map(function(pair) {
      return '<span class="model-chip">' + esc(pair[0]) + '<span class="count">\u00d7' + pair[1] + '</span></span>';
    }).join('') + '</div>';
  }
}

/* ── Config bar ────────────────────────────────────────────── */
async function loadConfig() {
  try {
    var res = await fetch('/api/config');
    var cfg = await res.json();
    var el = $('#config-bar');
    if (!cfg || !Object.keys(cfg).length) { el.style.display = 'none'; return; }
    el.style.display = '';
    var html = '';
    if (cfg.model) html += '<span><span class="cfg-label">Model</span><span class="cfg-val">' + esc(cfg.model) + '</span></span>';
    if (cfg.max_concurrent) html += '<span><span class="cfg-label">Concurrency</span><span class="cfg-val">' + cfg.max_concurrent + '</span></span>';
    if (cfg.budget) html += '<span><span class="cfg-label">Budget</span><span class="cfg-val">$' + cfg.budget + '</span></span>';
    if (cfg.flows) {
      html += '<span><span class="cfg-label">Flows</span>';
      var sel = $('#flow-filter');
      for (var name in cfg.flows) {
        if (name === 'task_agent') continue; /* task_agent has its own dashboard */
        var on = cfg.flows[name];
        html += '<span class="cfg-chip ' + (on ? 'on' : 'off') + '">' + esc(name) + '</span>';
        if (!sel.querySelector('option[value="' + name + '"]')) {
          var opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name.charAt(0).toUpperCase() + name.slice(1).replace('_', ' ');
          sel.appendChild(opt);
        }
      }
      html += '</span>';
    }
    html += '<a href="/dashboard/admin" class="admin-link">Admin</a>';
    el.innerHTML = html;
  } catch (e) { $('#config-bar').style.display = 'none'; }
}

/* ── Data Fetching ─────────────────────────────────────────── */
async function fetchRuns() {
  var hours = $('#period').value;
  var flow = $('#flow-filter').value;
  try {
    var results = await Promise.all([
      fetch('/api/stats?since_hours=' + hours),
      fetch('/api/runs?limit=200&since_hours=' + hours + (flow ? '&flow=' + flow : '')),
    ]);
    var stats = await results[0].json();
    var data = await results[1].json();
    _allRuns = data.runs || [];

    /* Re-resolve _selectedIdx after data refresh (indices may shift) */
    if (_selectedIdx >= 0 && _selectedStarted) {
      var cur = _allRuns[_selectedIdx];
      if (!cur || cur.event_id !== _selectedEid || cur.started_at !== _selectedStarted) {
        _selectedIdx = _allRuns.findIndex(function(r) { return r.event_id === _selectedEid && r.started_at === _selectedStarted; });
      }
    }

    renderOverview(stats);
    renderSidebar();

    /* Update detail view if the selected run's data changed */
    if (_selectedEid) {
      var r = _selectedIdx >= 0 ? _allRuns[_selectedIdx] : _allRuns.find(function(x) { return x.event_id === _selectedEid; });
      if (r) {
        var fp = runStatus(r) + '|' + (r.cost_usd || 0) + '|' + (r.duration_s || 0);
        if (_prevFingerprint !== fp) {
          _prevFingerprint = fp;
          renderRunDetail(r);
        }
      }
    }
  } catch (e) {
    console.error('Failed to fetch runs:', e);
  }
}

async function fetchLive() {
  try {
    var res = await fetch('/api/live');
    _liveSnap = await res.json();
    renderLiveOverview(_liveSnap);
    renderSidebar();
  } catch (e) { /* ignore */ }
}

/* ── Initialization ────────────────────────────────────────── */
$('#search-input').addEventListener('input', renderSidebar);
$('#flow-filter').addEventListener('change', function() { fetchRuns(); });
$('#status-filter').addEventListener('change', renderSidebar);
$('#period').addEventListener('change', function() { fetchRuns(); });
window.addEventListener('hashchange', handleHash);

async function init() {
  await Promise.all([loadConfig(), fetchRuns(), fetchLive()]);
  if (location.hash) handleHash();

  /* Polling */
  setInterval(fetchLive, 3000);
  setInterval(fetchRuns, 15000);
}

init();
</script>
</body>
</html>
